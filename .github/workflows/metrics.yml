# Mass model-quality testing. Runs scripts/benchmark_models.py, which benchmarks
# and COMPARES the LLM models listed in that script's MODELS registry across:
#   - reasoning / decomposition quality (LLM-as-judge)
#   - tool-calling accuracy
#   - intent-routing accuracy vs the ground-truth (GT) dataset
#   - latency and cost per query
# and writes a side-by-side comparison report to results/benchmark.md.
#
# To ENABLE this workflow:
#   1. Remove the leading "# " from every line below the banner.
#   2. Add the LLM provider API keys as repository secrets (see the env: block).
#   3. Make the GT dataset available to CI. tests/data/ is currently gitignored
#      (the `data/` rule in trade-iq-pod/.gitignore), so the runner cannot read
#      tests/data/intent_dataset.json. Add an exception such as `!tests/data/`
#      and commit the dataset(s) — expand intent_dataset.json (or add more GT
#      files) for true "mass" testing.
#   4. To compare a different set of models, edit the MODELS registry in
#      scripts/benchmark_models.py.
