# =============================================================================
# METRICS WORKFLOW  --  DISABLED (entirely commented out; never triggers)
# =============================================================================
# Mass model-quality testing. Runs scripts/benchmark_models.py, which benchmarks
# and COMPARES models across:
#   - reasoning / decomposition quality (LLM-as-judge)
#   - intent-routing accuracy vs the ground-truth (GT) dataset
#   - latency and cost per query
# and writes a side-by-side comparison report to results/benchmark.md.
#
# BACKEND: the benchmark defaults to --backend claude_code, i.e. it runs the
# Claude model family (Opus / Sonnet / Haiku) through Claude Code so the calls
# are billed to the Claude Code SUBSCRIPTION QUOTA, not a metered API key.
# (Native tool-calling tasks are skipped in this mode — the Agent SDK is
# agentic, not single-shot.) To benchmark the metered multi-provider set
# instead, use --backend providers and supply provider API keys.
#
# To ENABLE this workflow:
#   1. Remove the leading "# " from every line below the banner.
#   2. Create a long-lived Claude Code token locally with `claude setup-token`
#      and store it as the repo secret CLAUDE_CODE_OAUTH_TOKEN.
#   3. Keep ANTHROPIC_API_KEY UNSET in this job — if set, it overrides the
#      subscription and you get billed against the metered API instead.
#   4. The GT dataset (tests/data/intent_dataset.json) is already committed.
#      Expand it for larger "mass" runs.
#   5. To compare a different model set, edit CLAUDE_CODE_MODELS (or MODELS) in
#      scripts/benchmark_models.py.
