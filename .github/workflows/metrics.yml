# =============================================================================
# METRICS WORKFLOW  --  DISABLED (entirely commented out; never triggers)
# =============================================================================
# Mass model-quality testing. Runs scripts/evaluate_models.py, which executes
# the TradeIQ GenAI Sales Assistant flow (Intent Classifier -> mock TextToSQL /
# Optimizer tool -> grounded Response Generator) for each model and COMPARES
# them on:
#   - intent classification accuracy vs the ground-truth (GT) dataset
#   - groundedness of generated answers (LLM judge + figure-overlap check)
#   - relevance and business-format quality
# and writes a side-by-side comparison report to results/model_eval.md.
#
# BACKEND: defaults to --backend claude_code, i.e. it runs the Claude model
# family (Opus / Sonnet / Haiku) through Claude Code so the calls are billed to
# the Claude Code SUBSCRIPTION QUOTA, not a metered API key. To evaluate the
# metered multi-provider set instead, use --backend providers with API keys.
#
# To ENABLE this workflow:
#   1. Remove the leading "# " from every line below the banner.
#   2. Create a long-lived Claude Code token locally with `claude setup-token`
#      and store it as the repo secret CLAUDE_CODE_OAUTH_TOKEN.
#   3. Keep ANTHROPIC_API_KEY UNSET in this job — if set, it overrides the
#      subscription and you get billed against the metered API instead.
#   4. The GT dataset (tests/data/intent_dataset.json) is already committed.
#      Expand it for larger "mass" runs.
#   5. To compare a different model set, edit CLAUDE_CODE_MODELS (or
#      PROVIDER_MODELS) in scripts/evaluate_models.py.
