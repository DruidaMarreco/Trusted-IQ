name: CI

# Continuous Integration — lint, type-check, and test the trade-iq-pod project
# on every push / PR. Metrics (model benchmarking) and CD (deployment) live in
# their own workflows: metrics.yml and cd.yml.
#
# The Python project lives at this nested path inside the repo; every job sets
# it as the working-directory default.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Linting: black (format check) + ruff (lint). Both are pinned dev deps, run
  # via `uv run` so CI uses the exact versions from uv.lock (same as local).
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (black, ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dependencies
        run: uv sync --group dev
      - name: black --check
        run: uv run black --check --diff src
      - name: ruff check
        run: uv run ruff check --output-format=github src

  # ---------------------------------------------------------------------------
  # Type checking with ty (Astral's type checker). Needs project deps installed
  # so imports resolve, hence `uv sync` first.
  # ---------------------------------------------------------------------------
  type-check:
    name: Type check (ty)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dependencies
        run: uv sync --group dev
      - name: ty check
        run: uv run ty check src

  # ---------------------------------------------------------------------------
  # Unit tests + coverage. Coverage is REPORTED but not gated yet:
  # pyproject sets fail_under=80 (the target for local `make test`), but CI
  # passes --cov-fail-under=0 until the planned mass quality-testing pass lands
  # more tests. Raise/remove the override then to enforce 80% in CI.
  #
  # Integration tests (tests/integration, -m integration) are intentionally NOT
  # run here: they need external services / API-key secrets. Wire them into a
  # dedicated job (guarded on secrets) once they exist.
  # ---------------------------------------------------------------------------
  test:
    name: Tests (pytest + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dependencies
        run: uv sync --group dev
      - name: pytest (unit) + coverage
        run: uv run pytest --cov --cov-report=term-missing --cov-report=xml --cov-fail-under=0
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
